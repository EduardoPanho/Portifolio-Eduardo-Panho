<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eduardo-Projetos</title>


  <link rel="stylesheet" href="./../styles/projetos/projetos.css">
  <link rel="stylesheet" href="./../styles/main.css">
  <link rel="stylesheet" href="./../styles/home_style/footer.css">
  <link rel="stylesheet" href="./../styles/repeated_css/bg/projects_bg.css">

  <script type="module" src="./../controller/projetos/banner_controller.js"></script>
  <script type="module" src="./../controller/projetos/cards_controller.js"></script>
  <script type="module" src="./../controller/projetos/projetos.js"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <main>

    <section id="banners_com_btns">
      <nav id="banners">
        <div id="banner_1" class="banner"></div>
        <div id="banner_2" class="banner"></div>
        <div id="banner_3" class="banner"></div>
        <div id="banner_4" class="banner"></div>
        <div id="banner_5" class="banner"></div>
      </nav>

      <nav id="btns_banner">
        <div onclick="girarBanner(0)" id="btn_banner_0" class="btn_banner"></div>
        <div onclick="girarBanner(1)" id="btn_banner_1" class="btn_banner"></div>
        <div onclick="girarBanner(2)" id="btn_banner_2" class="btn_banner"></div>
        <div onclick="girarBanner(3)" id="btn_banner_3" class="btn_banner"></div>
        <div onclick="girarBanner(4)" id="btn_banner_4" class="btn_banner"></div>
      </nav>

      <section id="cards"></section>

      <div class="space"></div>

  </main>

  <footer class="footer">

    <button title="Clique para abrir o GitHub." onclick="window.location.href='https://github.com/EduardoPanho'"
      class="footer-left">
      <i class="fa-brands fa-github fa-2xl"></i>
    </button>

    <div class="footer-center">

      <button onclick="toggleModal()" class="tab1 nav-item"><i class="fa-solid fa-bars fa-xl"></i></button>

      <div id="modal" class="modal">
        <div class="modal-content">

          <button onclick="window.location.href='https://portfolio-edit-one.vercel.app/cards.html'" class="modal-info">
            <p>Editar cards</p>
          </button>

          <button class="fechar" onclick="toggleModal()"><i class="fa-solid fa-xmark fa-xl"></i></button>

        </div>
      </div>

      <button onclick="window.location.href='./../index.html'" class="home nav-item">
        <p class="text-home">Home</p>
      </button>

      <button style="background-color: #EDEDED;" onclick="window.location.href='./projetos.html'"
        class="projetos nav-item">
        <p style="color: #0088FF;" class="text-projetos">Projetos</p>
      </button>

      <button onclick="window.location.href='./formacao.html'" class="formacao nav-item">
        <p class="text-formacao">Formação</p>
      </button>

      <button class="search nav-item"><i class="fa-regular fa-user fa-xl"></i></button>

    </div>

    <div class="footer-right">
      <button class="toolbar-btn" title="Clique para abrir o certificado."
        onclick="window.location.href='https://drive.google.com/file/d/13LuqcThsnZye7Qsr5_9xsr-9DtZAkC2u/view?usp=sharing'"><i
          class="fa-regular fa-file fa-xl"></i></button>
    </div>

  </footer>

  <script src="./../controller/homeinicio/tab_controller.js"></script>
